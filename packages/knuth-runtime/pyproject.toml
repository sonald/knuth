[project]
name = "knuth-runtime"
version = "0.1.0"
description = "Agent runtime orchestration for the Knuth framework"
requires-python = ">=3.12"
dependencies = ["knuth-agentfsd", "knuth-llmd", "knuth-toold"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/knuth_runtime"]
