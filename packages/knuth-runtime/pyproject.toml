[project]
name = "knuth-runtime"
version = "0.1.0"
description = "Agent runtime orchestration for the Knuth framework"
requires-python = ">=3.12"
dependencies = [
    "anyio>=4.12.0",
    "knuth-core",
    "knuth-llmd",
    "knuth-toold",
    "pydantic>=2.13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/knuth_runtime"]
