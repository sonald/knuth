[project]
name = "knuth-toold"
version = "0.1.0"
description = "Tool registry and execution for the Knuth agent framework"
requires-python = ">=3.12"
dependencies = ["anyio>=4.12.0", "knuth-core", "knuth-llmd", "jsonschema>=4.0.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/knuth_toold"]
