[project]
name = "knuth-im"
version = "0.1.0"
description = "Knuth IM host that wires runtime policy to the AG-UI transport"
requires-python = ">=3.12"
dependencies = [
    "knuth-agui",
    "knuth-cli",
    "knuth-llmd",
    "knuth-runtime",
    "uvicorn[standard]>=0.30.0",
]

[project.scripts]
knuth-im = "knuth_im.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/knuth_im"]
