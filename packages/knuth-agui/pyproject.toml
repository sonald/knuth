[project]
name = "knuth-agui"
version = "0.1.0"
description = "AG-UI transport for an already-constructed Knuth agent runtime"
requires-python = ">=3.12"
dependencies = [
    "ag-ui-protocol",
    "anyio>=4.12.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "knuth-core",
    "knuth-llmd",
    "knuth-runtime",
    "knuth-toold",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/knuth_agui"]
