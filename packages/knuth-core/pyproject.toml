[project]
name = "knuth-core"
version = "0.1.0"
description = "Shared data models for the Knuth framework"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.13.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/knuth"]
