[project]
name = "knuth-cli"
version = "0.1.0"
description = "Command-line interface for the Knuth agent framework"
requires-python = ">=3.12"
dependencies = [
    "anyio>=4.12.0",
    "knuth-core",
    "knuth-llmd",
    "knuth-runtime",
    "knuth-toold",
    "platformdirs>=4.0.0",
    "pyyaml>=6.0",
]

[project.scripts]
knuth = "knuth_cli.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/knuth_cli"]
